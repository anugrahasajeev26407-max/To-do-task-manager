<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasky — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">✦</span>
        <span class="brand-name">Tasky</span>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-filter="all">
          <span class="nav-icon">◈</span> All Tasks
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-item" data-filter="active">
          <span class="nav-icon">◎</span> Active
          <span class="nav-count" id="count-active">0</span>
        </button>
        <button class="nav-item" data-filter="completed">
          <span class="nav-icon">◉</span> Completed
          <span class="nav-count" id="count-completed">0</span>
        </button>
      </nav>

      <div class="categories-section">
        <div class="section-label">Categories</div>
        <div class="categories">
          <button class="cat-chip active" data-cat="all">All</button>
          <button class="cat-chip" data-cat="work">Work</button>
          <button class="cat-chip" data-cat="personal">Personal</button>
          <button class="cat-chip" data-cat="health">Health</button>
          <button class="cat-chip" data-cat="learning">Learning</button>
        </div>
      </div>

      <div class="progress-box">
        <div class="progress-label">Today's Progress</div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 0 done</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">

      <header class="topbar">
        <div class="greeting">
          <div class="greeting-sub">Good work, keep going 🚀</div>
          <h1 class="greeting-title">My Tasks</h1>
        </div>
        <button class="add-btn" id="openModal">+ New Task</button>
      </header>

      <!-- Search & Sort -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Search tasks..." />
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="priority">Priority</option>
          <option value="alpha">A → Z</option>
        </select>
      </div>

      <!-- Task List -->
      <div class="task-list" id="taskList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">◈</div>
          <div class="empty-title">No tasks yet</div>
          <div class="empty-sub">Click "+ New Task" to get started</div>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">New Task</h2>
        <button class="modal-close" id="closeModal">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Task Title *</label>
          <input type="text" class="form-input" id="taskTitle" placeholder="What needs to be done?" />
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-input form-textarea" id="taskDesc" placeholder="Add some details..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select class="form-input" id="taskPriority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-input" id="taskCategory">
              <option value="work">Work</option>
              <option value="personal">Personal</option>
              <option value="health">Health</option>
              <option value="learning">Learning</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" class="form-input" id="taskDue" />
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" id="cancelModal">Cancel</button>
        <button class="btn-save" id="saveTask">Save Task</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
